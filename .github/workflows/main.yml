name: Hello world workflow

on: workflow_dispatch                    # workflow_dispatch= No trigger point set -> manual trigger 

# env:
#   NAME: Debojyoti
jobs:
  my_first_jod:                          # it is job ID
    name: My First Job                   # it is the job name
    runs-on: ubuntu-latest               # Agent / Agent Pool  ->Here Github hosted agent taken
    
    steps:
      
      # - name: Checkout
      #   uses: actions/checkout@v6.0.2
      
      - name: greeting
        #run: echo "This is my day-1 GitHub Actions's pipeline executed by $NAME" 
        run: echo "This is my day-1 GitHub Actions's pipeline executed by ${{ vars.NAME }} OS we are using {{ RUNNER.OS }}" 
        
  my_second_job:
    name: My second job
    needs: my_first_jod                  # my 2nd job will execute only post 1st job's sucess
    runs-on: windows-latest
    if: always()

    # env:
    #   Day: "47 days remaining"
    
    steps:
      - name: Greetings
        run: write-host "Hello from windows from $env:NAME only ${{ vars.Day }}"
